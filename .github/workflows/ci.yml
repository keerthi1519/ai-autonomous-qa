name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          GROQ_API_KEY: ci-dummy-key
          MODEL_NAME: llama-3.3-70b-versatile
        run: pytest tests/ -v

      - name: Verify all modules compile
        run: python -m compileall -q app frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t aiqa-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t aiqa-frontend .
