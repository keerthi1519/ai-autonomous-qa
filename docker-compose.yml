services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: aiqa-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      PYTHONUNBUFFERED: "1"

    volumes:
      # Shared data only — code is baked into the image.
      - ./uploads:/app/uploads
      - ./generated_tests:/app/generated_tests
      - ./reports:/app/reports

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: aiqa-frontend

    ports:
      - "8501:8501"

    environment:
      BACKEND_URL: http://backend:8000

    depends_on:
      backend:
        condition: service_healthy

    volumes:
      - ./uploads:/app/uploads
      - ./generated_tests:/app/generated_tests
      - ./reports:/app/reports

    restart: unless-stopped
