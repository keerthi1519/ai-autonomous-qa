services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: aiqa-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      PYTHONUNBUFFERED: "1"

    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - ./generated_tests:/app/generated_tests
      - ./reports:/app/reports

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: aiqa-frontend

    ports:
      - "8501:8501"

    environment:
      BACKEND_URL: http://backend:8000

    depends_on:
      - backend

    volumes:
      - .:/app
      - ./reports:/app/reports
      - ./generated_tests:/app/generated_tests

    restart: unless-stopped